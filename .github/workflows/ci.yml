name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-import-check:
    name: Lint & import sanity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU-only deps for CI (no CUDA)
        run: |
          pip install --upgrade pip
          # Install CPU-only torch so import checks pass without a GPU
          pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.40.2 accelerate==0.29.3 \
                      pyyaml==6.0.1 numpy==1.26.4 tqdm==4.66.2 \
                      plotly==5.21.0 pandas==2.2.2 streamlit==1.34.0 \
                      mlflow==2.12.2

      - name: Lint with ruff
        run: |
          pip install ruff==0.4.4
          ruff check . --ignore E501

      - name: Import sanity check
        run: |
          python -c "from benchmarks.profiler import Profiler, ProfileResult; print('profiler OK')"
          python -c "from evals.eval_utils import EvalResult, load_all_results; print('eval_utils OK')"
          python -c "from analysis.pareto import build_combined_df, is_pareto_optimal; print('pareto OK')"

      - name: Validate benchmark config schema
        run: |
          python -c "
          import yaml
          with open('configs/benchmark_config.yaml') as f:
              cfg = yaml.safe_load(f)
          assert 'model' in cfg
          assert 'backends' in cfg
          assert 'profiling' in cfg
          assert 'eval' in cfg
          assert 'max_new_tokens' in cfg['profiling']
          assert 'num_warmup_runs' in cfg['profiling']
          assert 'num_benchmark_runs' in cfg['profiling']
          print('Config schema OK')
          "

  dashboard-smoke:
    name: Dashboard import check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dashboard deps
        run: |
          pip install --upgrade pip
          pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu
          pip install streamlit==1.34.0 plotly==5.21.0 pandas==2.2.2 numpy==1.26.4 pyyaml==6.0.1

      - name: Check dashboard syntax
        run: python -m py_compile dashboard/app.py && echo "dashboard/app.py OK"
